<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixel Art Cam</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100vw; height: 100vh  }
    body { display: grid; place-items: center; background: black }
    canvas, #actions { position: fixed }

    #actions {
      display: flex;
      flex-direction: column;
      margin: 1rem;
      left: 0;
      top: 0;
      color: #fff;
      z-index: 1
    }

    button {
      padding: 0.8rem 2.4rem;
      font-size: 12px;
      background-color: #555;
      color: #fff;
      border: 2px solid #999;
      border-radius: 0.2rem;
      cursor: pointer
    }

    button:hover {
      background-color: #777;
    }
  </style>

  <script src="scripts/libs/utils.js" defer></script>
  <script src="scripts/libs/canvasUtils.js" defer></script>
  <script src="scripts/libs/imageProcessor.js" defer></script>
  <script src="scripts/libs/input.js" defer></script>
  
  <script src="scripts/main.js" defer></script>
</head>
<body>
  <div id="actions">
    <button id="upload-image"><img class="galery-icon" src="images/galery.svg"></img>Upload</button>
  </div>
</body>
</html>
